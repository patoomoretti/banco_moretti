{% extends "empleado/empleado.html" %} 

{% block area_trabajo %}
<div class="action-container">
    <div class="action-header">
        <h3><i class="fas fa-hand-holding-dollar"></i> Solicitar Nuevo Préstamo</h3>
        <p>Complete los detalles del crédito para procesar la solicitud.</p>
    </div>

    <form class="admin-form" action="{{ url_for('empleado.solicitar_prestamo_view') }}" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="dni">DNI del Cliente</label>
                <input type="number" id="dni" name="dni" placeholder="DNI sin puntos" required>
            </div>

            <div class="form-group">
                <label for="monto">Monto a Solicitar ($)</label>
                <input type="number" id="monto" name="monto" step="0.01" placeholder="Ej: 500000" required>
            </div>

            <div class="form-group">
                <label for="cuotas">Cantidad de Cuotas</label>
                <select id="cuotas" name="cuotas" required>
                    <option value="6">6 Cuotas</option>
                    <option value="12">12 Cuotas</option>
                    <option value="24">24 Cuotas</option>
                    <option value="36">36 Cuotas</option>
                    <option value="48">48 Cuotas</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tasa">Tasa de Interés Anual (%)</label>
                <input type="number" id="tasa" name="tasa" placeholder="Ej: 35" required>
            </div>

            <div class="form-group">
                <label for="destino">Destino del Préstamo</label>
                <select id="destino" name="destino">
                    <option value="Personal">Personal / Consumo</option>
                    <option value="Vehiculo">Compra de Vehículo</option>
                    <option value="Vivienda">Refacción de Vivienda</option>
                    <option value="Viajes">Viajes y Turismo</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fecha_solicitud">Fecha de Solicitud</label>
                <input type="text" id="fecha_solicitud" name="fecha_solicitud" value="{{ hoy }}" readonly>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Procesar Solicitud</button>
            <button type="reset" class="btn-cancel">Limpiar Formulario</button>
        </div>

        {% if mensaje %}
            <div class="alert-error">
                <i class="fas fa-exclamation-circle"></i> {{ mensaje }}
            </div>
        {% endif %}
    </form>
</div>
{% endblock %}
