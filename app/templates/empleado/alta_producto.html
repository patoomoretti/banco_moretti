{% extends "empleado/empleado.html" %} 

{% block area_trabajo %}
<div class="action-container">
    <div class="action-header">
        <h3><i class="fas fa-credit-card"></i> Alta de Producto Financiero</h3>
        <p>Vincule tarjetas de débito o crédito a la cuenta del cliente.</p>
    </div>

    <form class="admin-form" action="{{ url_for('empleado.alta_producto_view') }}" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="dni">DNI del Cliente</label>
                <input type="number" id="dni" name="dni" placeholder="Ingrese DNI del titular" required>
            </div>

            <div class="form-group">
                <label for="marca">Marca de Tarjeta</label>
                <select id="marca" name="marca" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ddd;" required>
                    <option value="" selected disabled>Seleccione marca</option>
                    <option value="visa">Visa</option>
                    <option value="master">MasterCard</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipo_producto">Tipo de Producto</label>
                <select id="tipo_producto" name="tipo_producto" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ddd;" required>
                    <option value="" selected disabled>Seleccione tipo</option>
                    <option value="debito">Tarjeta de Débito</option>
                    <option value="credito">Tarjeta de Crédito</option>
                </select>
            </div>

            <div class="form-group" style="grid-column: span 1;">
                </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Activar Producto</button>
        </div>

        {% if mensaje %}
            <div class="alert-error">
                <i class="fas fa-info-circle"></i> {{ mensaje }}
            </div>
        {% endif %}
    </form>
</div>
{% endblock %}
