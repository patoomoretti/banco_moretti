{% extends "base.html" %}
{% block content %}

<section class="form-container">
    <div class="form-card">

        <header class="form-header">
            <h2 class="form-title-display">Bienvenido</h2>
            <div class="form-title-separator"></div>
            <p class="form-subtitle">Ingresá tus credenciales para continuar</p>
        </header>

        {% if mensaje %}
        <div class="form-error-simple">{{ mensaje }}</div>
        {% endif %}

        <form method="POST" class="form-centered">
            
            <div class="form-group-centered">
                <label class="form-label-centered">Número de DNI</label>
                <input class="form-input-premium" name="dni" placeholder="Ej: 40123456" required>
            </div>

            <div class="form-group-centered">
                <label class="form-label-centered">PIN de acceso</label>
                <input class="form-input-premium" type="password" name="pin" placeholder="••••" required>
            </div>

            <button type="submit" class="form-btn-premium">Ingresar</button>
        </form>

        <div class="form-links-refined">
            <a href="/registrar">Crear cuenta nueva</a>
            <span class="dot-separator">•</span>
            <a href="/restablecer">¿Olvidaste tu PIN?</a>
        </div>

    </div>
</section>

{% endblock %}
