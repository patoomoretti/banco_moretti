{% extends "base.html" %}
{% block title %}Restablecer PIN - Banco Moretti{% endblock %}

{% block content %}

<section class="form-container">

    <div class="form-card">

        <h2 class="form-title">Restablecer PIN</h2>

        {% if mensaje %}
            <p class="form-message">{{ mensaje }}</p>
        {% endif %}

        <form method="POST" class="form-group">

            <div class="form-group">
                <label class="form-label">DNI</label>
                <input type="number" name="dni" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label">Nuevo PIN</label>
                <input type="number" name="pin" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label">Repetir PIN</label>
                <input type="number" name="pin_reingresar" class="form-input" required>
            </div>

            <button type="submit" class="form-btn">Restablecer</button>
        </form>

        <div class="form-links">
            <a href="/" class="form-link">Volver al inicio</a>
        </div>

    </div>

</section>

{% endblock %}
